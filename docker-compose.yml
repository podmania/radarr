services:
  sonarr:
    image: ghcr.io/podmania/radarr:latest
    # set to host user id and gid
    # defaults to 1000:1000
    # user: 1001:1001
    container_name: radarr
    ports:
      - 7878:7878
    volumes:   
      - ./config:/config
      # Per Radarr best practice, downloads and media should both be under /data to avoid remote folder mapping and performance bottlenecks
      # ex. /data/movies, /data/downloads
      - ./data:/data
      - /etc/localtime:/etc/localtime:ro # optional: use either TZ variable or localtime mapping, not both
    # environment:
    #   - TZ=America/New_York
    restart: unless-stopped

